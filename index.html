<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Love Letters</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&family=Pinyon+Script&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<canvas id="aurora-bg"></canvas>
<div class="vignette"></div>
<canvas id="particles"></canvas>

<div id="stage">
  <div id="book-wrap">

    <div class="spine"></div>

    <div id="page-card"></div>

    <div id="cover">
      <div class="cover-front">
        <div class="cover-border-outer"></div>
        <div class="cover-border-inner"></div>

        <div class="cover-corner tl">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4 Q4 20 20 20 Q4 20 4 36" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <path d="M4 4 Q20 4 20 20 Q20 4 36 4" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <circle cx="4" cy="4" r="2" fill="#ffffff44"/>
          </svg>
        </div>
        <div class="cover-corner tr">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4 Q4 20 20 20 Q4 20 4 36" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <path d="M4 4 Q20 4 20 20 Q20 4 36 4" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <circle cx="4" cy="4" r="2" fill="#ffffff44"/>
          </svg>
        </div>
        <div class="cover-corner bl">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4 Q4 20 20 20 Q4 20 4 36" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <path d="M4 4 Q20 4 20 20 Q20 4 36 4" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <circle cx="4" cy="4" r="2" fill="#ffffff44"/>
          </svg>
        </div>
        <div class="cover-corner br">
          <svg viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M4 4 Q4 20 20 20 Q4 20 4 36" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <path d="M4 4 Q20 4 20 20 Q20 4 36 4" stroke="#ffffff44" stroke-width="1" fill="none"/>
            <circle cx="4" cy="4" r="2" fill="#ffffff44"/>
          </svg>
        </div>

        <div class="cover-emblem">
          <svg viewBox="0 0 52 52" fill="none" xmlns="http://www.w3.org/2000/svg">
            <circle cx="26" cy="26" r="22" stroke="#ffffff35" stroke-width="1"/>
            <circle cx="26" cy="26" r="16" stroke="#ffffff22" stroke-width="1"/>
            <path d="M26 8 L28 18 L38 14 L30 22 L40 26 L30 30 L38 38 L28 34 L26 44 L24 34 L14 38 L22 30 L12 26 L22 22 L14 14 L24 18 Z" fill="#ffffff28"/>
            <circle cx="26" cy="26" r="3" fill="#ffffff35"/>
          </svg>
        </div>

        <div class="cover-title">Love Letters</div>
        <div class="cover-subtitle">A curated collection</div>

        <div class="cover-divider">
          <div class="cover-divider-line"></div>
          <div class="cover-divider-gem"></div>
          <div class="cover-divider-line"></div>
        </div>

        <div class="cover-tagline">Places on the web where romance lives and breathes</div>

        <button class="cover-btn" id="open-btn">Open the Book</button>
      </div>

      <div class="cover-back">
        <div class="cover-back-ornament">&#10022;</div>
        <div class="cover-back-text">A treasury of beauty</div>
      </div>
    </div>

  </div>
</div>

<button class="nav-btn hidden" id="btn-prev">&#8592;</button>
<button class="nav-btn hidden" id="btn-next">&#8594;</button>
<div id="dots"></div>
<button id="btn-close" class="hidden" title="Close (Esc)">
  <svg width="14" height="14" viewBox="0 0 14 14" fill="none" xmlns="http://www.w3.org/2000/svg">
    <path d="M1 1 L13 13 M13 1 L1 13" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
  </svg>
  <span>Close</span>
</button>

<script src="main.js"></script>
</body>
</html>
